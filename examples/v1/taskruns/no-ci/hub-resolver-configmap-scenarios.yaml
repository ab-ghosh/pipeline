    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
---
# #############################################################################
# 4g. url param overrides ConfigMap URL list
# #############################################################################
# Patch first:
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type merge -p '{"data":{"artifact-hub-urls":"- https://should-not-be-contacted.invalid\n"}}'
#   sleep 5
#
# Expected: ConfigMap URLs are never contacted; url param endpoint is used
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4g-url-overrides-configmap-
  labels:
    test-suite: hub-resolver-configmap-scenarios
    test-scenario: "4g"
spec:
  workspaces:
    - name: output
      emptyDir: {}
  podTemplate:
    securityContext:
      fsGroup: 65532
  params:
    - name: url
      value: https://github.com/tektoncd/pipeline.git
    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
      - name: url
        value: https://artifacthub.io
---
# #############################################################################
# 4h. Tekton Hub ConfigMap URL list (bypasses missing TEKTON_HUB_API)
# #############################################################################
# Patch first (remove artifact-hub-urls, add tekton-hub-urls):
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type json -p '[{"op":"remove","path":"/data/artifact-hub-urls"},{"op":"add","path":"/data/tekton-hub-urls","value":"- https://api.hub.tekton.dev\n"}]'
#   sleep 5
#
# Expected: validation passes (no "please configure TEKTON_HUB_API" error).
#           May fail at fetch time if api.hub.tekton.dev DNS doesn't resolve.
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4h-tekton-configmap-url-
  labels:
    test-suite: hub-resolver-configmap-scenarios
    test-scenario: "4h"
spec:
  workspaces:
    - name: output
      emptyDir: {}
  podTemplate:
    securityContext:
      fsGroup: 65532
  params:
    - name: url
      value: https://github.com/tektoncd/pipeline.git
    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: tekton
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9"
---
# #############################################################################
# 4i. Version constraint + ConfigMap URL list — pinning test
