#     --type json -p '[{"op":"remove","path":"/data/tekton-hub-urls"},{"op":"add","path":"/data/artifact-hub-urls","value":"- https://artifacthub.io\n"}]'
#   sleep 5
#
# Expected: version constraint resolved from first successful hub, then
#           resource fetch pinned to that same hub
