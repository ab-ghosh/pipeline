# =============================================================================
# Hub Resolver — ConfigMap URL List Scenarios
# =============================================================================
#
# These scenarios require patching the hubresolver-config ConfigMap BEFORE
# running each TaskRun. Patch the ConfigMap, wait a few seconds for the
# resolver to pick it up, then apply the corresponding TaskRun.
#
# Cleanup:
#   kubectl delete taskrun -l test-suite=hub-resolver-configmap-scenarios
#   Then restore the ConfigMap:
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type json -p '[{"op":"remove","path":"/data/artifact-hub-urls"}]'
# =============================================================================


# #############################################################################
# 4a. Single ConfigMap URL resolves successfully
# #############################################################################
# Patch first:
  kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
    --type merge -p '{"data":{"artifact-hub-urls":"- https://artifacthub.io\n"}}'
  sleep 5
#
# Expected: resolves from the single configured URL
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4a-single-configmap-url-
  labels:
    test-suite: hub-resolver-configmap-scenarios
    test-scenario: "4a"
spec:
  workspaces:
    - name: output
      emptyDir: {}
  podTemplate:
    securityContext:
      fsGroup: 65532
  params:
    - name: url
      value: https://github.com/tektoncd/pipeline.git
    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
---
# #############################################################################
# 4b. Single ConfigMap URL fails — error NOT wrapped in aggregate message
# #############################################################################
# Patch first:
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type merge -p '{"data":{"artifact-hub-urls":"- https://broken-hub.invalid\n"}}'
#   sleep 5
#
# Expected: error "fail to fetch Artifact Hub resource: ..."
#           NOT "failed to fetch resource from any configured hub URL"
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4b-single-url-error-
  labels:
    test-suite: hub-resolver-configmap-scenarios
    test-scenario: "4b"
spec:
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
---
# #############################################################################
# 4c. Multiple URLs — first fails, falls through to second
# #############################################################################
# Patch first:
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type merge -p '{"data":{"artifact-hub-urls":"- https://broken-hub.invalid\n- https://artifacthub.io\n"}}'
#   sleep 5
#
# Expected: first URL returns error, resolver falls through to second URL
#           and resolves successfully
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4c-multi-url-fallback-
  labels:
    test-suite: hub-resolver-configmap-scenarios
    test-scenario: "4c"
spec:
  workspaces:
    - name: output
      emptyDir: {}
  podTemplate:
    securityContext:
      fsGroup: 65532
  params:
    - name: url
      value: https://github.com/tektoncd/pipeline.git
    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
---
# #############################################################################
# 4d. Multiple URLs — first succeeds, second not contacted
# #############################################################################
# Patch first:
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type merge -p '{"data":{"artifact-hub-urls":"- https://artifacthub.io\n- https://should-not-be-contacted.invalid\n"}}'
#   sleep 5
#
# Expected: resolves from first URL; second URL is never contacted
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4d-multi-url-first-wins-
  labels:
    test-suite: hub-resolver-configmap-scenarios
    test-scenario: "4d"
spec:
  workspaces:
    - name: output
      emptyDir: {}
  podTemplate:
    securityContext:
      fsGroup: 65532
  params:
    - name: url
      value: https://github.com/tektoncd/pipeline.git
    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
---
# #############################################################################
# 4e. All ConfigMap URLs fail — aggregated error message
# #############################################################################
# Patch first:
#   kubectl patch configmap hubresolver-config -n tekton-pipelines-resolvers \
#     --type merge -p '{"data":{"artifact-hub-urls":"- https://broken-hub-1.invalid\n- https://broken-hub-2.invalid\n"}}'
#   sleep 5
#
# Expected: error "failed to fetch resource from any configured hub URL: ..."
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-4e-all-urls-fail-
