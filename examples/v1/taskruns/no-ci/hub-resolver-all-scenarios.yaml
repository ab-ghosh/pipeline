# =============================================================================
# Hub Resolver — All Test Scenarios
# =============================================================================
#
# Apply:   kubectl apply -f hub-resolver-all-scenarios.yaml
# Cleanup: kubectl delete taskrun -l test-suite=hub-resolver-scenarios
#
# Prerequisites:
#   - Tekton Pipelines v0.41.0+ with resolvers installed
#   - enable-hub-resolver = true in resolvers-feature-flags ConfigMap
#   - Beta features enabled
#
# Some scenarios require specific ConfigMap or env var setup — see comments.
# Replace resource names/versions with ones available in your hub instance.
# =============================================================================

# ---------------------------------------------------------------------------
# 1a. Artifact Hub + task + full semver
# Expected: resolves git-clone v0.9.0 from Artifact Hub and runs successfully
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-1a-artifact-task-semver-
  labels:
    test-suite: hub-resolver-scenarios
    test-scenario: "1a"
spec:
  workspaces:
    - name: output
      emptyDir: {}
  podTemplate:
    securityContext:
      fsGroup: 65532
  params:
    - name: url
      value: https://github.com/tektoncd/pipeline.git
    - name: revision
      value: main
  taskRef:
    resolver: hub
    params:
      - name: type
        value: artifact
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: version
        value: "0.9.0"
---
# ---------------------------------------------------------------------------
# 1b. Artifact Hub + task + simplified semver (resolver appends ".0")
# Expected: resolver converts "0.9" to "0.9.0" and runs successfully
# ---------------------------------------------------------------------------
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: hub-1b-artifact-simplified-semver-
